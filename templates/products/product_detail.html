{% extends "base.html" %}
{% load static %}

{% block page_header %}
<div class="container header-container">
    <div class="row">
        <div class="col">
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
     <div class="container">
        <div class="row">
        <div class="col-12 col-md-6 col-lg-4 offset-lg-2">
        {% if product.image %}
            <img class="card-img-top" src="{{ product.image.url}}" alt="{{product.name}}">
        {% endif %}
        </div>
        <div class="col-12 col-md-6 col-lg-4">
                <p>{{product.name}}</p>
                <p>£{{product.price}}</p>
                {% if product.rating %}
                    <p>{{product.rating}}</p>
                {% endif %}
                <p>{{product.description}}</p>
        </div>
        </div>
     </div>
{% endblock %}
