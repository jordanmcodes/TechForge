{% extends "base.html" %}
{% load static %}

{% block page_header %}
<div class="container header-container">
    <div class="row">
        <div class="col">
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
     <div class=" container">
        <div class="row">
        {% for product in products %}
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card">
                <div class="card-body">
                    <p>{{ product.name }}</p>
                    <p>£{{ product.price }} </p>
                    <p>{{product.category}}</p>
                </div>
            </div>
            </div>
            {% endfor %}
        </div>  
     </div>

{% endblock %}
